meters:
- name: gpu_seconds
  description: GPU runtime billed per second per accelerator type (T4, L4, A10, L40s, A100, RTX PRO 6000, H100, H200, B200).
  unit: seconds
  aggregation: sum
  dimensions:
  - account
  - app
  - gpu_type
- name: vcpu_seconds
  description: CPU runtime billed per vCPU per second ($0.00000655/vCPU/s).
  unit: seconds
  aggregation: sum
  dimensions:
  - account
  - app
- name: memory_gb_seconds
  description: Memory billed per GB per second ($0.00000222/GB/s).
  unit: gb_seconds
  aggregation: sum
  dimensions:
  - account
  - app
- name: storage_gb_month
  description: Persistent volume storage billed per GB-month ($0.05/GB/month; first 100GB free).
  unit: gb_month
  aggregation: sum
  dimensions:
  - account
  - app
- name: platform_fee
  description: Flat monthly platform fee at the Standard tier ($100/month); $0 for Hobby.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Pull Cerebrium usage and billing data; inspect per-app GPU-second burn by accelerator type.
- name: Allocation
  description: Tag apps per workload/team; map per-second compute to internal cost centers.
- name: Optimization
  description: Right-size GPU type to the workload (use T4/L4/A10 where sufficient); enable scale-to-zero; tune min/max replicas and cold-start storage; cut idle time since billing is per second.
- name: Accountability
  description: Assign owners per app; review per-second compute spend monthly against budget.
