description: >-
  FinOps view of Cerebrium spend. Cerebrium bills compute by the second:
  GPU time at a per-second rate per accelerator type (T4 through B200), CPU per
  vCPU-second, and memory per GB-second, charged only while a function executes.
  Persistent storage is billed per GB-month (first 100GB free). Flat platform
  fees apply at the Standard tier ($100/month) on top of compute; Hobby is free
  plus compute; Enterprise is custom.
notes: >-
  Per-second GPU/CPU/memory rates and the GPU catalog are subject to change;
  verify against the Cerebrium pricing page during reconciliation.
sources:
- https://www.cerebrium.ai/pricing
- https://www.cerebrium.ai/docs
