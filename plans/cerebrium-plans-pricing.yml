specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Cerebrium
providerId: cerebrium
created: '2026-06-20'
modified: '2026-06-20'
reconciled: true
tags:
- AI
- GPU
- Serverless
- Inference
- ML Infrastructure
- Plans
description: >-
  Cerebrium combines flat monthly plan tiers (Hobby, Standard, Enterprise) with
  usage-based, per-second compute billing. You pay for GPU, CPU, and memory only
  while a function is running, plus persistent storage per GB-month. GPU rates
  are charged per second by accelerator type. The Hobby plan is free plus
  compute; the Standard plan adds a $100/month platform fee plus compute with
  unlimited apps and seats; Enterprise is custom with volume discounts and
  unlimited GPU concurrency.
notes: >-
  Per-second GPU, CPU, memory, and storage rates as published on the Cerebrium
  pricing page; verify current rates and the full GPU catalog on the pricing
  page during reconciliation.
sources:
- https://www.cerebrium.ai/pricing
- https://www.cerebrium.ai/docs
plans:
- id: cerebrium-hobby
  name: Hobby
  type: free
  description: >-
    Free platform plan with basic features and community support; compute is
    billed separately per second.
  entries:
  - label: Platform Fee
    name: hobby_platform_fee
    type: flat
    metric: subscription
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: $0 (compute billed separately)
    userMultiplied: false
  elements:
  - name: Serverless GPU/CPU Deployments
  - name: Community Support
- id: cerebrium-standard
  name: Standard
  type: paid
  description: >-
    Paid platform plan with unlimited apps and seats; compute is billed
    separately per second on top of the monthly platform fee.
  entries:
